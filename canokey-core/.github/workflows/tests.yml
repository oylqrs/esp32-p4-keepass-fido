name: tests
on: [push, pull_request, workflow_dispatch]

jobs:
  build_tools:
    name: Build custom yubico-piv-tool package
    #if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - name: Cache deb files
      uses: actions/cache@v5
      env:
        cache-name: tools-deb
      with:
        path: |
          yubico-piv-tool_*.deb
          libykpiv1_*.deb
        key: ${{ runner.os }}-${{ env.cache-name }}
    - name: Check file existence
      id: check_yubico_piv
      run: |
        if test -n "$(find . -maxdepth 1 -name 'yubico-piv-tool_*.deb' -print)"; then
          echo "need_build=false" >> $GITHUB_OUTPUT
        else
          echo "need_build=true" >> $GITHUB_OUTPUT
        fi
    - name: Package Install
      if: steps.check_yubico_piv.outputs.need_build == 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -q -y build-essential cmake devscripts equivs
    - name: Build yubico-piv-tool package
      if: steps.check_yubico_piv.outputs.need_build == 'true'
      run: |
        set -x
        git clone https://github.com/z4yx/yubico-piv-tool.git
        sudo mk-build-deps yubico-piv-tool/debian/control -i
        rm -f *.deb # remove useless build-deps pseudo package
        cd yubico-piv-tool
        eval $(dpkg-architecture -s)
        dpkg-buildpackage -b -uc -us --no-sign
        rm -rf ../*dbgsym*.deb
        DEB_SUFFIX="$(dpkg-parsechangelog | sed -n 's/^Version: //p')_${DEB_HOST_ARCH}"
        sudo apt-get install -q -y ../yubico-piv-tool_${DEB_SUFFIX}.deb ../libykpiv1_${DEB_SUFFIX}.deb # test installation
    - name: Upload package files
      uses: actions/upload-artifact@v7
      with:
        name: tools-deb
        path: "*.deb"

  build_test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: build_tools
    steps:
    - name: Prepare - Download packages
      uses: actions/download-artifact@v8
      with:
        name: tools-deb

    - name: Prepare - Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -q -y gpg scdaemon opensc libeac3 git build-essential cmake swig psmisc procps pcscd pcsc-tools libhidapi-dev libnpth0-dev libssl3 zlib1g libglib2.0-0 openssl openssh-server libpcsclite-dev libudev-dev libcbor-dev libcmocka-dev python3-pip python3-setuptools python3-wheel lcov yubikey-manager
        sudo apt-get install -q -y ./yubico-piv-tool_*.deb ./libykpiv1_*.deb
        pip3 install --upgrade pip

    - name: Prepare - Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: "^1.24"
      id: go

    - name: Prepare - Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Check - Code formatting
      continue-on-error: true
      run: |
        find . -path ./canokey-crypto -prune -o -path ./littlefs -prune -o -path ./tinycbor -prune -o \
          \( -name '*.c' -o -name '*.h' \) -print \
          | xargs clang-format --dry-run --Werror

    - name: Prepare - Checkout piv-go
      uses: actions/checkout@v6
      with:
        repository: canokeys/piv-go
        path: piv-go

    - name: Prepare - Checkout ckman
      uses: actions/checkout@v6
      with:
        repository: canokeys/yubikey-manager
        ref: canokey-next
        path: yubikey-manager

    - name: Cache - GO Modules
      uses: actions/cache@v5
      env:
        cache-name: go_mod
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('./go.mod') }}

    - name: Cache - Patched GnuPG
      id: cache-gpg
      uses: actions/cache@v5
      env:
        cache-name: cache_gpg_binary
      with:
        path: gnupg
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('./test-via-pcsc/build_gpg.sh') }}

    - name: Cache - FIDO tools
      id: cache-fido
      uses: actions/cache@v5
      env:
        cache-name: cache_fido_tools
      with:
        path: |
          u2f-ref-code
          libfido2
          fido2-tests
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('./test-via-pcsc/build_fido_tests.sh') }}

    - name: Build - Patched GnuPG
      if: steps.cache-gpg.outputs.cache-hit != 'true'
      run: ./test-via-pcsc/build_gpg.sh

    - name: Install - Patched GnuPG
      run: |
        ./test-via-pcsc/install_gpg.sh
        gpg --version

    - name: Build - FIDO tests
      if: steps.cache-fido.outputs.cache-hit != 'true'
      run: ./test-via-pcsc/build_fido_tests.sh

    - name: Install - FIDO tests
      run: |
        ./test-via-pcsc/install_fido_tests.sh
        fido2-tests/.venv/bin/python - <<'PY'
        import importlib.metadata
        import pathlib
        import sys
        import fido2

        print("python:", sys.executable)
        print("fido2_version:", importlib.metadata.version("fido2"))
        print("fido2_path:", pathlib.Path(fido2.__file__).resolve())
        PY
        which fido2-token
        ldd $(which fido2-token)

    - name: Build - CanoKey tests
      run: |
        mkdir build && pushd build
        cmake .. -DENABLE_TESTS=ON -DENABLE_DEBUG_OUTPUT=ON -DCMAKE_BUILD_TYPE=Debug
        make -j2
      
    - name: Prepare - Start SSH server
      run: |
        cat >/tmp/sshd_config <<EOF
        StrictModes no
        UsePAM no
        Port 2200
        EOF
        sudo mkdir -p /run/sshd
        sudo /usr/sbin/sshd -f /tmp/sshd_config

    - name: Tests - Smoking tests
      run: |
        cd build
        ctest --output-on-failure

    - name: Prepare - Start pcscd
      run: |
        echo 0 >/tmp/canokey-test-up && echo 0 >/tmp/canokey-test-nfc # Emulate the USB mode
        sudo killall -9 pcscd || true
        sudo cp build/libu2f-virt-card.so /usr/local/lib/
        sudo cp test-via-pcsc/pcscd-reader.conf /etc/reader.conf.d/
        bash -c 'sudo LD_PRELOAD="$(gcc -print-file-name=libasan.so) $(gcc -print-file-name=libubsan.so)" pcscd --disable-polkit -a -f >/tmp/pcscd.log &'
        sleep 15 # wait for admin applet reset
        timeout 1s pcsc_scan || true
        go env -w GO111MODULE=on
        sudo chmod 777 /tmp/canokey-*
        sudo chown root:root /tmp/canokey-*
        ls -l /tmp

    - name: Tests - Admin applet
      run: go test -v test-via-pcsc/admin_test.go

    - name: Tests - NDEF applet
      run: go test -v test-via-pcsc/ndef_test.go

    - name: Tests - FIDO2 applet
      run: |
        echo 1 >/tmp/canokey-test-nfc # Emulate the NFC mode for PCSC/NFC tests
        cat /tmp/canokey-test-nfc
        #pushd test-real && ./test-libfido2.sh && popd
        cd fido2-tests
        #../build/fido-hid-over-udp &
        .venv/bin/python -m pytest --color=yes --vendor canokeys --nfc tests/standard/
        .venv/bin/python -m pytest --color=yes --vendor canokeys --nfc \
          --ignore=tests/vendor/canokeys/test_mldsa65.py tests/vendor/canokeys/
        #kill %1

    - name: Tests - CTAPHID applet
      run: |
        rm -f /tmp/canokey-fido-hid-over-udp-lfs-root
        CANOKEY_VIRT_NFC=0 CANOKEY_VIRT_RESET_STORAGE=1 build/fido-hid-over-udp >/tmp/fido-hid-over-udp.log 2>&1 &
        echo $! >/tmp/fido-hid-over-udp.pid
        trap 'kill "$(cat /tmp/fido-hid-over-udp.pid)" 2>/dev/null || true; tail -n 200 /tmp/fido-hid-over-udp.log || true' EXIT
        cd fido2-tests
        .venv/bin/python - <<'PY'
        import sys
        import time

        sys.path.insert(0, ".")
        from tests.vendor.solo.udp_backend import force_udp_backend

        force_udp_backend()

        from fido2.hid import CtapHidDevice, CTAPHID

        deadline = time.time() + 30
        last_error = None
        while time.time() < deadline:
            try:
                dev = next(CtapHidDevice.list_devices())
                nonce = b"12345678"
                if dev.call(CTAPHID.INIT, nonce)[:8] != nonce:
                    raise RuntimeError("CTAPHID INIT nonce mismatch")
                if dev.call(CTAPHID.PING, b"ping") != b"ping":
                    raise RuntimeError("CTAPHID PING mismatch")
                print("CTAPHID simulator is ready")
                break
            except Exception as exc:
                last_error = exc
                time.sleep(1)
        else:
            raise last_error
        PY
        .venv/bin/python - <<'PY'
        import sys

        sys.path.insert(0, ".")
        from tests.vendor.solo.udp_backend import force_udp_backend

        force_udp_backend()

        from fido2.ctap2 import Ctap2
        from fido2.hid import CtapHidDevice, CTAPHID

        dev = next(CtapHidDevice.list_devices())
        nonce = b"abcdefgh"
        assert dev.call(CTAPHID.INIT, nonce)[:8] == nonce
        assert dev.call(CTAPHID.PING, b"ping") == b"ping"
        assert dev.call(CTAPHID.WINK, b"") == b""
        info = Ctap2(dev).get_info()
        assert "FIDO_2_0" in info.versions
        print("CTAPHID smoke checks passed")
        PY
        .venv/bin/python -m pytest --color=yes --vendor canokeys --sim tests/standard/connect_test.py
        .venv/bin/python -m pytest --color=yes --vendor canokeys --sim tests/standard/fido2/test_getinfo.py
        .venv/bin/python -m pytest --color=yes --vendor canokeys --sim tests/vendor/canokeys/test_mldsa65.py -s
        kill "$(cat /tmp/fido-hid-over-udp.pid)" || true
        trap - EXIT

    - name: Tests - U2F applet
      run: |
        echo 1 >/tmp/canokey-test-nfc
        echo 0 | ./u2f-ref-code/u2f-tests/NFC/u2f_nfc_test -v | tee /tmp/u2f_nfc_test.log
        test $(grep -c 'PASS(signCheckSignature(regReq, regRsp, authReq, authRsp, rapduLen))' /tmp/u2f_nfc_test.log) -eq 6

    - name: Tests - OATH applet
      run: |
        echo 0 >/tmp/canokey-test-nfc
        go test -v test-via-pcsc/oath_test.go

    - name: Tests - OpenPGP applet
      # GPG requires a tty to work
      shell: script -e -c "bash {0}"
      run: bash .github/workflows/test-openpgp.sh
    - name: Tests - Interoperate with ckman openpgp
      # Disabled because of build failure
      if: false
      run: |
        cd yubikey-manager
        pipx install poetry
        poetry install
        poetry run pytest --reader 'Canokey ' --no-serial --use-version 5.7.0 -s ./tests/device/test_openpgp.py -v
        poetry run pytest --reader 'Canokey ' --no-serial --use-version 5.7.0 -s ./tests/device/test_piv.py -v

    - name: Tests - PIV applet
      run: bash .github/workflows/test-piv.sh
    - name: Wrap-up - Prepare test coverage report
      run: |
        go test test-via-pcsc/admin_test.go -v -run TestFSUsage
        kill "$(cat /tmp/fido-hid-over-udp.pid)" 2>/dev/null || true
        sudo killall pcscd || true # To flush cov files
        ls /tmp
        sleep 2
        mkdir coverage
        find build/ -name '*.gcda' | grep -P '/(canokey-crypto|virt-card|tinycbor|littlefs|interfaces)/' | xargs rm
        lcov --base-directory . --directory . -c -o ./coverage/lcov.info

    - name: Wrap-up - Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Wrap-up - Upload log files
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: logs
        path: /tmp/*.log
    
    - name: Wrap-up - Upload data files
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: data
        path: /tmp/[lc][fe]*
